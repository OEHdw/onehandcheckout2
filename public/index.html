<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneHand – Prodotto</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gray-100: #f5f5f5;
      --gray-200: #e8e8e8;
      --gray-500: #9e9e9e;
      --gray-700: #444;
      --accent: #ff3b30;
      --accent-dark: #cc2e25;
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-100);
      color: var(--black);
      min-height: 100vh;
    }

    .product-page {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 110px;
    }

    /* IMAGE */
    .product-image {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .product-image .emoji {
      font-size: 8rem;
      user-select: none;
    }

    /* CONTENT */
    .content {
      background: var(--white);
      border-radius: var(--radius) var(--radius) 0 0;
      margin-top: -16px;
      position: relative;
      padding: 28px 20px 24px;
    }

    .brand {
      font-size: .75rem;
      font-weight: 600;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .product-name {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 24px;
    }
    .price-current { font-size: 1.9rem; font-weight: 800; }
    .price-original { font-size: 1rem; color: var(--gray-500); text-decoration: line-through; }
    .price-save {
      font-size: .75rem; font-weight: 700; color: var(--accent);
      background: #fff0ef; padding: 3px 8px; border-radius: 20px;
    }

    .description {
      font-size: .9rem;
      color: var(--gray-700);
      line-height: 1.65;
    }

    /* SKELETON */
    .skeleton {
      background: linear-gradient(90deg, var(--gray-200) 25%, var(--gray-100) 50%, var(--gray-200) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .sk-brand { height: 12px; width: 80px; margin-bottom: 8px; }
    .sk-name { height: 26px; width: 70%; margin-bottom: 6px; }
    .sk-name2 { height: 26px; width: 45%; margin-bottom: 20px; }
    .sk-price { height: 36px; width: 120px; margin-bottom: 24px; }
    .sk-desc { height: 14px; width: 100%; margin-bottom: 8px; }
    .sk-desc2 { height: 14px; width: 85%; margin-bottom: 8px; }
    .sk-desc3 { height: 14px; width: 90%; }

    /* STICKY CTA */
    .cta-bar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: var(--white);
      padding: 14px 20px 32px;
      box-shadow: 0 -4px 20px rgba(0,0,0,.08);
      z-index: 200;
    }

    .btn-buy {
      width: 100%;
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: .2px;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-buy:active { transform: scale(.98); background: var(--accent-dark); }
    .btn-buy:disabled { background: var(--gray-500); cursor: not-allowed; transform: none; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 999;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--white);
      border-radius: 24px 24px 0 0;
      padding: 24px 24px 40px;
      width: 100%; max-width: 480px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,1,.32,1);
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--gray-200);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }

    .modal-product-row {
      display: flex; gap: 14px; align-items: center;
      padding: 16px; background: var(--gray-100);
      border-radius: 14px; margin-bottom: 20px;
    }
    .modal-product-emoji { font-size: 2.5rem; }
    .modal-product-info { flex: 1; }
    .modal-product-name { font-weight: 700; font-size: .95rem; }
    .modal-product-price { font-weight: 800; font-size: 1rem; }

    .checkout-form { display: flex; flex-direction: column; gap: 12px; }
    .form-row { display: flex; gap: 10px; }
    .form-field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .form-field label { font-size: .75rem; font-weight: 600; color: var(--gray-700); }
    .form-field input {
      border: 2px solid var(--gray-200);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    .form-field input:focus { border-color: var(--black); }

    .btn-pay {
      width: 100%;
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: 14px;
      padding: 17px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-pay:active { transform: scale(.98); background: var(--accent-dark); }

    .secure-badge {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; font-size: .75rem; color: var(--gray-500); margin-top: 10px;
    }

    /* TOAST */
    .toast {
      position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1c1c1e; color: #fff;
      padding: 12px 20px; border-radius: 30px;
      font-size: .85rem; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
      z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .error-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--gray-500);
      font-size: .9rem;
    }
  </style>
</head>
<body>

<div class="product-page" id="productPage">
  <!-- IMAGE -->
  <div class="product-image" id="productImage">
    <span class="emoji">🎧</span>
  </div>

  <!-- CONTENT -->
  <div class="content" id="productContent">
    <div class="sk-brand skeleton"></div>
    <div class="sk-name skeleton"></div>
    <div class="sk-name2 skeleton"></div>
    <div class="sk-price skeleton"></div>
    <div class="sk-desc skeleton"></div>
    <div class="sk-desc2 skeleton"></div>
    <div class="sk-desc3 skeleton"></div>
  </div>
</div>

<!-- STICKY CTA -->
<div class="cta-bar">
  <button class="btn-buy" id="btnBuy" onclick="openCheckout()" disabled>
    ⚡ Acquista ora
  </button>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title">Checkout veloce ⚡</p>

    <div class="modal-product-row">
      <span class="modal-product-emoji" id="modalEmoji">🎧</span>
      <div class="modal-product-info">
        <p class="modal-product-name" id="modalName">–</p>
      </div>
      <span class="modal-product-price" id="modalPrice">–</span>
    </div>

    <div class="checkout-form">
      <div class="form-row">
        <div class="form-field">
          <label>Nome</label>
          <input type="text" placeholder="Mario" inputmode="text" autocomplete="given-name" />
        </div>
        <div class="form-field">
          <label>Cognome</label>
          <input type="text" placeholder="Rossi" inputmode="text" autocomplete="family-name" />
        </div>
      </div>
      <div class="form-field">
        <label>Email</label>
        <input type="email" placeholder="mario@email.com" inputmode="email" autocomplete="email" />
      </div>
      <div class="form-field">
        <label>Numero di carta</label>
        <input type="text" placeholder="1234 5678 9012 3456" inputmode="numeric" autocomplete="cc-number" maxlength="19" oninput="formatCard(this)" />
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Scadenza</label>
          <input type="text" placeholder="MM/AA" inputmode="numeric" autocomplete="cc-exp" maxlength="5" oninput="formatExp(this)" />
        </div>
        <div class="form-field">
          <label>CVV</label>
          <input type="text" placeholder="123" inputmode="numeric" autocomplete="cc-csc" maxlength="3" />
        </div>
      </div>
      <button class="btn-pay" id="btnPay" onclick="completePurchase()">🔒 Paga</button>
    </div>
    <p class="secure-badge">🔒 Pagamento sicuro · SSL 256-bit</p>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  let product = null;

  async function loadProduct() {
    try {
      const res = await fetch('/api/product');
      if (!res.ok) throw new Error('not found');
      product = await res.json();
      renderProduct(product);
    } catch {
      document.getElementById('productContent').innerHTML =
        '<p class="error-state">Impossibile caricare il prodotto.</p>';
    }
  }

  function renderProduct(p) {
    const imageEl = document.getElementById('productImage');
    if (p.imageUrl) {
      imageEl.innerHTML = `<img src="${p.imageUrl}" alt="${p.name}" />`;
    } else {
      imageEl.innerHTML = `<span class="emoji">${p.image || '🛍️'}</span>`;
    }

    const discount = p.priceOriginal
      ? Math.round((1 - p.price / p.priceOriginal) * 100)
      : null;

    document.getElementById('productContent').innerHTML = `
      <p class="brand">${p.brand || ''}</p>
      <h1 class="product-name">${p.name}</h1>
      <div class="price-row">
        <span class="price-current">€${p.price}</span>
        ${p.priceOriginal ? `<span class="price-original">€${p.priceOriginal}</span>` : ''}
        ${discount ? `<span class="price-save">-${discount}%</span>` : ''}
      </div>
      <p class="description">${p.description}</p>
    `;

    const btn = document.getElementById('btnBuy');
    btn.textContent = `⚡ Acquista ora · €${p.price}`;
    btn.disabled = false;

    document.getElementById('modalEmoji').textContent = p.image || '🛍️';
    document.getElementById('modalName').textContent = p.name;
    document.getElementById('modalPrice').textContent = `€${p.price}`;
    document.getElementById('btnPay').textContent = `🔒 Paga €${p.price}`;
  }

  function openCheckout() {
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeCheckout() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  function closeOnOverlay(e) {
    if (e.target === document.getElementById('modalOverlay')) closeCheckout();
  }

  function completePurchase() {
    closeCheckout();
    showToast('✅ Ordine confermato! Grazie 🎉');
  }

  function formatCard(input) {
    let v = input.value.replace(/\D/g, '').slice(0, 16);
    input.value = v.replace(/(.{4})/g, '$1 ').trim();
  }
  function formatExp(input) {
    let v = input.value.replace(/\D/g, '').slice(0, 4);
    if (v.length >= 3) v = v.slice(0, 2) + '/' + v.slice(2);
    input.value = v;
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  loadProduct();
</script>
</body>
</html>
