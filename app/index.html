<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneHand – Prodotto</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gray-100: #f5f5f5;
      --gray-200: #e8e8e8;
      --gray-500: #9e9e9e;
      --gray-700: #444;
      --accent: #7C3AED;
      --accent-dark: #6D28D9;
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-100);
      color: var(--black);
      min-height: 100vh;
    }

    .product-page {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 110px;
    }

    .product-image {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .product-image img { width: 100%; height: 100%; object-fit: cover; }
    .product-image .emoji { font-size: 8rem; user-select: none; }

    .content {
      background: var(--white);
      border-radius: var(--radius) var(--radius) 0 0;
      margin-top: -16px;
      position: relative;
      padding: 28px 20px 24px;
    }

    .brand {
      font-size: .75rem;
      font-weight: 600;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .product-name {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 24px;
    }
    .price-current { font-size: 1.9rem; font-weight: 800; }
    .price-original { font-size: 1rem; color: var(--gray-500); text-decoration: line-through; }
    .price-save {
      font-size: .75rem; font-weight: 700; color: var(--accent);
      background: #f5f0ff; padding: 3px 8px; border-radius: 20px;
    }

    .description { font-size: .9rem; color: var(--gray-700); line-height: 1.65; }

    .skeleton {
      background: linear-gradient(90deg, var(--gray-200) 25%, var(--gray-100) 50%, var(--gray-200) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .sk-brand { height: 12px; width: 80px; margin-bottom: 8px; }
    .sk-name { height: 26px; width: 70%; margin-bottom: 6px; }
    .sk-name2 { height: 26px; width: 45%; margin-bottom: 20px; }
    .sk-price { height: 36px; width: 120px; margin-bottom: 24px; }
    .sk-desc { height: 14px; width: 100%; margin-bottom: 8px; }
    .sk-desc2 { height: 14px; width: 85%; margin-bottom: 8px; }
    .sk-desc3 { height: 14px; width: 90%; }

    .cta-bar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: var(--white);
      padding: 14px 20px 32px;
      box-shadow: 0 -4px 20px rgba(0,0,0,.08);
      z-index: 200;
    }

    .btn-buy {
      width: 100%;
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: .2px;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-buy:active { transform: scale(.98); background: var(--accent-dark); }
    .btn-buy:disabled { background: var(--gray-500); cursor: not-allowed; transform: none; }

    /* CHECKOUT MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 500;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--white);
      border-radius: 24px 24px 0 0;
      padding: 24px 24px 40px;
      width: 100%; max-width: 480px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.32,1,.32,1);
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--gray-200);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }

    .modal-product-row {
      display: flex; gap: 14px; align-items: center;
      padding: 16px; background: var(--gray-100);
      border-radius: 14px; margin-bottom: 20px;
    }
    .modal-product-emoji { font-size: 2.5rem; }
    .modal-product-info { flex: 1; }
    .modal-product-name { font-weight: 700; font-size: .95rem; }
    .modal-product-price { font-weight: 800; font-size: 1rem; }

    .checkout-form { display: flex; flex-direction: column; gap: 12px; }
    .form-row { display: flex; gap: 10px; }
    .form-field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .form-field label { font-size: .75rem; font-weight: 600; color: var(--gray-700); }
    .form-field input {
      border: 2px solid var(--gray-200);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    .form-field input:focus { border-color: var(--accent); }

    .btn-pay {
      width: 100%;
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: 14px;
      padding: 17px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-pay:active { transform: scale(.98); background: var(--accent-dark); }
    .btn-pay:disabled { background: var(--gray-500); cursor: not-allowed; transform: none; }

    .secure-badge {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; font-size: .75rem; color: var(--gray-500); margin-top: 10px;
    }

    /* TOAST */
    .toast {
      position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1c1c1e; color: #fff;
      padding: 12px 20px; border-radius: 30px;
      font-size: .85rem; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
      z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .error-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--gray-500);
      font-size: .9rem;
    }

    /* ============================================================
       RECEIPT SCREEN — full-screen animated anti-screenshot receipt
       ============================================================ */
    .receipt-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
    }
    .receipt-screen.active { display: block; }

    #receiptCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .receipt-card {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 28px;
      padding: 32px 24px 24px;
      width: min(380px, 90vw);
      text-align: center;
      color: #fff;
    }

    .receipt-check-wrap {
      width: 72px;
      height: 72px;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      animation: popIn .4s cubic-bezier(.32,1.6,.32,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .receipt-check { font-size: 2.2rem; }

    .receipt-label {
      font-size: .7rem;
      font-weight: 700;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    .receipt-product-name {
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .receipt-price-val {
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 22px;
    }

    .receipt-details {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      font-size: .82rem;
      padding: 5px 0;
    }
    .receipt-row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,.1); }
    .receipt-row span:first-child { opacity: 0.65; }
    .receipt-row span:last-child { font-weight: 700; font-family: 'SF Mono', monospace; }

    .receipt-instruction {
      font-size: .95rem;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: .2px;
    }

    .receipt-pattern-hint {
      font-size: .7rem;
      opacity: 0.5;
      margin-bottom: 16px;
    }

    .receipt-brand {
      font-size: .65rem;
      opacity: 0.4;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
  </style>
</head>
<body>

<div class="product-page" id="productPage">
  <div class="product-image" id="productImage">
    <span class="emoji">🎧</span>
  </div>
  <div class="content" id="productContent">
    <div class="sk-brand skeleton"></div>
    <div class="sk-name skeleton"></div>
    <div class="sk-name2 skeleton"></div>
    <div class="sk-price skeleton"></div>
    <div class="sk-desc skeleton"></div>
    <div class="sk-desc2 skeleton"></div>
    <div class="sk-desc3 skeleton"></div>
  </div>
</div>

<div class="cta-bar">
  <button class="btn-buy" id="btnBuy" onclick="openCheckout()" disabled>
    ⚡ Acquista ora
  </button>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title">Checkout veloce ⚡</p>

    <div class="modal-product-row">
      <span class="modal-product-emoji" id="modalEmoji">🎧</span>
      <div class="modal-product-info">
        <p class="modal-product-name" id="modalName">–</p>
      </div>
      <span class="modal-product-price" id="modalPrice">–</span>
    </div>

    <div class="checkout-form">
      <div class="form-row">
        <div class="form-field">
          <label>Nome</label>
          <input type="text" placeholder="Mario" inputmode="text" autocomplete="given-name" />
        </div>
        <div class="form-field">
          <label>Cognome</label>
          <input type="text" placeholder="Rossi" inputmode="text" autocomplete="family-name" />
        </div>
      </div>
      <div class="form-field">
        <label>Email</label>
        <input type="email" placeholder="mario@email.com" inputmode="email" autocomplete="email" />
      </div>
      <div class="form-field">
        <label>Numero di carta</label>
        <input type="text" placeholder="1234 5678 9012 3456" inputmode="numeric" autocomplete="cc-number" maxlength="19" oninput="formatCard(this)" />
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Scadenza</label>
          <input type="text" placeholder="MM/AA" inputmode="numeric" autocomplete="cc-exp" maxlength="5" oninput="formatExp(this)" />
        </div>
        <div class="form-field">
          <label>CVV</label>
          <input type="text" placeholder="123" inputmode="numeric" autocomplete="cc-csc" maxlength="3" />
        </div>
      </div>
      <button class="btn-pay" id="btnPay" onclick="completePurchase()">🔒 Paga</button>
    </div>
    <p class="secure-badge">🔒 Pagamento sicuro · SSL 256-bit</p>
  </div>
</div>

<!-- ANIMATED RECEIPT SCREEN -->
<div class="receipt-screen" id="receiptScreen">
  <canvas id="receiptCanvas"></canvas>
  <div class="receipt-card">
    <div class="receipt-check-wrap">
      <span class="receipt-check">✓</span>
    </div>
    <p class="receipt-label">Pagamento completato</p>
    <p class="receipt-product-name" id="receiptProductName"></p>
    <p class="receipt-price-val" id="receiptPriceVal"></p>
    <div class="receipt-details">
      <div class="receipt-row">
        <span>Data</span>
        <span id="receiptDate"></span>
      </div>
      <div class="receipt-row">
        <span>Ora</span>
        <span id="receiptTime"></span>
      </div>
      <div class="receipt-row">
        <span>ID Transazione</span>
        <span id="receiptTxId"></span>
      </div>
    </div>
    <p class="receipt-instruction">Mostra questo schermo all'uscita 👋</p>
    <p class="receipt-pattern-hint" id="receiptPatternHint"></p>
    <p class="receipt-brand">OneHand · Checkout</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let product = null;
  let stopAnimation = null;

  // ── Product loading ──────────────────────────────────────────

  async function loadProduct() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const url = id ? `/api/product/${id}` : '/api/product';

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('not found');
      product = await res.json();
      renderProduct(product);
    } catch {
      document.getElementById('productContent').innerHTML =
        '<p class="error-state">Impossibile caricare il prodotto.</p>';
    }
  }

  function renderProduct(p) {
    const imageEl = document.getElementById('productImage');
    if (p.imageUrl) {
      imageEl.innerHTML = `<img src="${p.imageUrl}" alt="${p.name}" />`;
    } else {
      imageEl.innerHTML = `<span class="emoji">${p.image || '🛍️'}</span>`;
    }

    const discount = p.priceOriginal
      ? Math.round((1 - p.price / p.priceOriginal) * 100)
      : null;

    document.getElementById('productContent').innerHTML = `
      <p class="brand">${p.brand || ''}</p>
      <h1 class="product-name">${p.name}</h1>
      <div class="price-row">
        <span class="price-current">€${p.price}</span>
        ${p.priceOriginal ? `<span class="price-original">€${p.priceOriginal}</span>` : ''}
        ${discount ? `<span class="price-save">-${discount}%</span>` : ''}
      </div>
      <p class="description">${p.description}</p>
    `;

    const btn = document.getElementById('btnBuy');
    btn.textContent = `⚡ Acquista ora · €${p.price}`;
    btn.disabled = false;

    document.getElementById('modalEmoji').textContent = p.image || '🛍️';
    document.getElementById('modalName').textContent = p.name;
    document.getElementById('modalPrice').textContent = `€${p.price}`;
    document.getElementById('btnPay').textContent = `🔒 Paga €${p.price}`;
  }

  // ── Checkout modal ───────────────────────────────────────────

  function openCheckout() {
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeCheckout() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  function closeOnOverlay(e) {
    if (e.target === document.getElementById('modalOverlay')) closeCheckout();
  }

  // ── Purchase & receipt ───────────────────────────────────────

  async function completePurchase() {
    const btn = document.getElementById('btnPay');
    btn.disabled = true;
    btn.textContent = 'Elaborazione...';

    try {
      const res = await fetch('/api/purchase', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          productId: product?._id,
          storeId: product?.storeId,
        }),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      closeCheckout();
      showReceipt(data);
    } catch {
      showToast('Errore durante il pagamento. Riprova.');
      btn.disabled = false;
      btn.textContent = `🔒 Paga €${product?.price}`;
    }
  }

  function showReceipt(data) {
    const ts = new Date(data.timestamp);
    const dateStr = ts.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const timeStr = ts.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

    document.getElementById('receiptProductName').textContent = product.name;
    document.getElementById('receiptPriceVal').textContent = `€${product.price}`;
    document.getElementById('receiptDate').textContent = dateStr;
    document.getElementById('receiptTime').textContent = timeStr;
    document.getElementById('receiptTxId').textContent = data.transactionId;
    document.getElementById('receiptPatternHint').textContent =
      `Pattern: ${data.pattern.count} ${data.pattern.shape} · velocità ${data.pattern.speedLabel}`;

    const screen = document.getElementById('receiptScreen');
    screen.classList.add('active');
    document.body.style.overflow = 'hidden';

    stopAnimation = startReceiptAnimation(
      document.getElementById('receiptCanvas'),
      data.pattern
    );
  }

  // ── Canvas animation (anti-screenshot receipt) ───────────────

  function startReceiptAnimation(canvas, pattern) {
    let raf;
    let t = 0;
    const speed = pattern.speed * 0.4;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function hexToRgb(hex) {
      return [
        parseInt(hex.slice(1, 3), 16),
        parseInt(hex.slice(3, 5), 16),
        parseInt(hex.slice(5, 7), 16),
      ];
    }

    const rgbColors = pattern.colors.map(hexToRgb);

    function drawBlob(ctx, x, y, r, [cr, cg, cb], alpha) {
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0, `rgba(${cr},${cg},${cb},${alpha})`);
      grad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function frame() {
      t += 0.008 * speed;
      const W = canvas.width;
      const H = canvas.height;
      const ctx = canvas.getContext('2d');

      // Animated background: blend between the 3 palette colors
      const phase = (Math.sin(t * 0.5) + 1) / 2;
      const phase2 = (Math.sin(t * 0.3 + 2) + 1) / 2;
      const [r1, g1, b1] = rgbColors[0];
      const [r2, g2, b2] = rgbColors[1];
      const [r3, g3, b3] = rgbColors[2];
      const bgR = Math.round(r1 + (r2 - r1) * phase + (r3 - r1) * phase2 * 0.4);
      const bgG = Math.round(g1 + (g2 - g1) * phase + (g3 - g1) * phase2 * 0.4);
      const bgB = Math.round(b1 + (b2 - b1) * phase + (b3 - b1) * phase2 * 0.4);
      ctx.fillStyle = `rgb(${bgR},${bgG},${bgB})`;
      ctx.fillRect(0, 0, W, H);

      // Animated blobs orbiting the center
      const cx = W / 2;
      const cy = H / 2;
      for (let i = 0; i < pattern.count; i++) {
        const angle = t * (0.6 + i * 0.25) + (i * Math.PI * 2 / pattern.count);
        const orbitR = Math.min(W, H) * (0.28 + 0.1 * Math.sin(t * 0.4 + i));
        const x = cx + Math.cos(angle) * orbitR;
        const y = cy + Math.sin(angle * 0.75) * orbitR;
        const blobSize = Math.min(W, H) * (0.22 + 0.07 * Math.sin(t * 1.5 + i));
        drawBlob(ctx, x, y, blobSize, rgbColors[i % 3], 0.55);
      }

      raf = requestAnimationFrame(frame);
    }

    frame();

    return function stop() {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', resize);
    };
  }

  // ── Utilities ────────────────────────────────────────────────

  function formatCard(input) {
    let v = input.value.replace(/\D/g, '').slice(0, 16);
    input.value = v.replace(/(.{4})/g, '$1 ').trim();
  }
  function formatExp(input) {
    let v = input.value.replace(/\D/g, '').slice(0, 4);
    if (v.length >= 3) v = v.slice(0, 2) + '/' + v.slice(2);
    input.value = v;
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  loadProduct();
</script>
</body>
</html>
