<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneHand – Dashboard Merchant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #7C3AED;
      --accent-dark: #6D28D9;
      --gray-100: #f5f5f5;
      --gray-200: #e8e8e8;
      --gray-500: #9e9e9e;
      --gray-700: #444;
      --black: #0a0a0a;
      --white: #fff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-100);
      color: var(--black);
      min-height: 100vh;
    }

    header {
      background: var(--white);
      padding: 20px 24px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo { font-size: 1.5rem; }
    header h1 { font-size: 1.1rem; font-weight: 800; }
    header p { font-size: .75rem; color: var(--gray-500); }

    .container { max-width: 720px; margin: 0 auto; padding: 32px 24px; }

    .section-title {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--gray-500);
      margin-bottom: 12px;
    }

    .card {
      background: var(--white);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .store-form { display: flex; gap: 10px; }
    .store-input {
      flex: 1;
      border: 2px solid var(--gray-200);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: .95rem;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .store-input:focus { border-color: var(--accent); }

    .btn-check {
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn-check:hover { background: var(--accent-dark); }

    /* Pattern info */
    .pattern-info { display: none; }
    .pattern-info.visible { display: block; }

    .pattern-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .pattern-store { font-size: 1rem; font-weight: 800; }
    .pattern-date { font-size: .8rem; color: var(--gray-500); }

    .pattern-badge-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 700;
      background: var(--gray-100);
      color: var(--gray-700);
    }
    .badge.highlight { background: #f5f0ff; color: var(--accent); }

    .color-swatches {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center;
    }
    .swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid var(--white);
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .color-arrow { color: var(--gray-500); font-size: .8rem; }

    .pattern-description {
      background: var(--gray-100);
      border-radius: 14px;
      padding: 16px;
      font-size: .85rem;
      color: var(--gray-700);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .pattern-description strong { color: var(--black); }

    /* Preview canvas */
    .preview-wrap {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 9/16;
      max-height: 480px;
    }
    #previewCanvas { width: 100%; height: 100%; display: block; }
    .preview-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-card {
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 20px;
      padding: 20px 18px;
      width: 80%;
      text-align: center;
      color: #fff;
    }
    .preview-check { font-size: 1.8rem; margin-bottom: 8px; }
    .preview-label { font-size: .7rem; opacity: .7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .preview-title { font-size: 1rem; font-weight: 800; margin-bottom: 2px; }
    .preview-price { font-size: 1.4rem; font-weight: 900; margin-bottom: 12px; }
    .preview-instruction { font-size: .75rem; font-weight: 700; }
    .preview-note {
      font-size: .65rem;
      opacity: .4;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray-500);
      font-size: .9rem;
    }
    .empty-icon { font-size: 2rem; margin-bottom: 8px; }
  </style>
</head>
<body>

<header>
  <span class="logo">🛍️</span>
  <div>
    <h1>OneHand Dashboard</h1>
    <p>Pattern giornaliero del receipt animato</p>
  </div>
</header>

<div class="container">

  <p class="section-title">Negozio</p>
  <div class="card">
    <div class="store-form">
      <input class="store-input" id="storeInput" type="text" placeholder="ID negozio (es. store-roma-01)" value="store-roma-01" />
      <button class="btn-check" onclick="loadPattern()">Controlla</button>
    </div>
  </div>

  <!-- Pattern info (shown after load) -->
  <div class="pattern-info" id="patternInfo">

    <p class="section-title">Pattern di oggi</p>
    <div class="card">
      <div class="pattern-header">
        <div>
          <p class="pattern-store" id="patternStore"></p>
          <p class="pattern-date" id="patternDate"></p>
        </div>
      </div>

      <div class="color-swatches" id="colorSwatches"></div>

      <div class="pattern-badge-row" id="patternBadges"></div>

      <div class="pattern-description" id="patternDescription"></div>
    </div>

    <p class="section-title">Anteprima receipt</p>
    <div class="card" style="padding: 0; overflow: hidden;">
      <div class="preview-wrap">
        <canvas id="previewCanvas"></canvas>
        <div class="preview-overlay">
          <div class="preview-card">
            <div class="preview-check">✓</div>
            <p class="preview-label">Pagamento completato</p>
            <p class="preview-title">Prodotto di esempio</p>
            <p class="preview-price">€29,90</p>
            <p class="preview-instruction">Mostra all'uscita 👋</p>
            <p class="preview-note">OneHand · Checkout</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Empty state before first load -->
  <div id="emptyState" class="empty-state">
    <p class="empty-icon">🔍</p>
    <p>Inserisci l'ID del tuo negozio per vedere il pattern di oggi.</p>
  </div>

</div>

<script>
  let stopPreview = null;

  async function loadPattern() {
    const storeId = document.getElementById('storeInput').value.trim();
    if (!storeId) return;

    try {
      const res = await fetch(`/api/pattern/${encodeURIComponent(storeId)}`);
      const data = await res.json();
      renderPattern(data);
    } catch {
      alert('Impossibile caricare il pattern. Controlla la connessione.');
    }
  }

  function renderPattern({ storeId, date, pattern }) {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('patternInfo').classList.add('visible');

    document.getElementById('patternStore').textContent = storeId;
    document.getElementById('patternDate').textContent = new Date(date).toLocaleDateString('it-IT', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
    });

    // Color swatches
    const swatchEl = document.getElementById('colorSwatches');
    swatchEl.innerHTML = pattern.colors.map((c, i) =>
      `${i > 0 ? '<span class="color-arrow">→</span>' : ''}<div class="swatch" style="background:${c}" title="${c}"></div>`
    ).join('');

    // Badges
    document.getElementById('patternBadges').innerHTML = `
      <span class="badge highlight">${pattern.count} ${pattern.shape}</span>
      <span class="badge">Velocità: ${pattern.speedLabel}</span>
      <span class="badge">Seed: ${Math.abs(pattern.seed) % 10000}</span>
    `;

    // Human description
    document.getElementById('patternDescription').innerHTML = `
      Oggi il receipt animato mostra <strong>${pattern.count} ${pattern.shape}</strong>
      che si muovono a velocità <strong>${pattern.speedLabel}</strong>.<br>
      I colori partono da <strong style="color:${pattern.colors[0]}">${colorName(pattern.colors[0])}</strong>,
      passano per <strong style="color:${pattern.colors[1]}">${colorName(pattern.colors[1])}</strong>
      e finiscono in <strong style="color:${pattern.colors[2]}">${colorName(pattern.colors[2])}</strong>.
    `;

    // Start preview animation
    if (stopPreview) stopPreview();
    stopPreview = startAnimation(document.getElementById('previewCanvas'), pattern);
  }

  function colorName(hex) {
    const map = { '#00D4FF': 'azzurro', '#8B5CF6': 'viola', '#FF006E': 'rosa' };
    return map[hex] || hex;
  }

  function startAnimation(canvas, pattern) {
    let raf;
    let t = 0;
    const speed = pattern.speed * 0.4;

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    }
    resize();

    function hexToRgb(hex) {
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    }
    const rgbColors = pattern.colors.map(hexToRgb);

    function drawBlob(ctx, x, y, r, [cr,cg,cb], alpha) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, `rgba(${cr},${cg},${cb},${alpha})`);
      g.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fill();
    }

    function frame() {
      t += 0.008 * speed;
      const W = canvas.width, H = canvas.height;
      const ctx = canvas.getContext('2d');

      const phase = (Math.sin(t * 0.5) + 1) / 2;
      const phase2 = (Math.sin(t * 0.3 + 2) + 1) / 2;
      const [r1,g1,b1] = rgbColors[0];
      const [r2,g2,b2] = rgbColors[1];
      const [r3,g3,b3] = rgbColors[2];
      ctx.fillStyle = `rgb(${
        Math.round(r1+(r2-r1)*phase+(r3-r1)*phase2*.4)},${
        Math.round(g1+(g2-g1)*phase+(g3-g1)*phase2*.4)},${
        Math.round(b1+(b2-b1)*phase+(b3-b1)*phase2*.4)})`;
      ctx.fillRect(0, 0, W, H);

      for (let i = 0; i < pattern.count; i++) {
        const angle = t*(0.6+i*0.25)+(i*Math.PI*2/pattern.count);
        const orbit = Math.min(W,H)*(0.28+0.1*Math.sin(t*0.4+i));
        drawBlob(ctx, W/2+Math.cos(angle)*orbit, H/2+Math.sin(angle*.75)*orbit,
          Math.min(W,H)*(0.22+0.07*Math.sin(t*1.5+i)), rgbColors[i%3], 0.55);
      }
      raf = requestAnimationFrame(frame);
    }
    frame();
    return () => cancelAnimationFrame(raf);
  }

  // Auto-load on page open
  loadPattern();
</script>
</body>
</html>
